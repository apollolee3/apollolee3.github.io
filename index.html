<!DOCTYPE html>
<html>
<head>
    <title>Apollo Lee</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="images/rocket.png" type="image/png">
    <style>
        html, body {
            height: 100%; /* ensures body and html elements take up full viewport height */
            padding: 0; /* set padding to 0 for both elements */
            margin: 0; /* remove any default margin */
            font-family: Courier, monospace;
            background: url('images/background.jpg') no-repeat center center fixed; 
            background-size: cover;
        }
        body {
            padding: 100px 75px 75px 75px; /* Top Right Bottom Left, adjusted top padding to move content down */
        }
        @media (max-width: 600px) {
           body {
              padding: 60px 20px 20px 20px; /* Adjusted top padding for smaller screens */
           }
        }
        .link-icon {
            height: 20px;
            width: 20px;
            margin-right: 13px;
            display: inline-block;
            margin: 0 auto;
        }
        a {
            text-decoration: none;
        }
        .profile-section, .contact-icons, .intro-text {
            margin-bottom: 30px;
            text-align: center;
        }
        .profile-pic {
            width: 80px;
            height: auto;
            margin-bottom: 30px;
            display: block;
            margin: 0 auto;
        }
        .content-container {
            background: #FFFFFF;
            padding: 30px;
            display: block;
            width: 50%;
            margin: 0 auto;
        }
        @media (max-width: 600px) {
            .content-container {
                width: 90%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="content-container">
        <div class="profile-section">
            <img src="images/astronaut.png" alt="Apollo Lee" class="profile-pic">
            <h1>Apollo Lee</h1>
        </div>
        <div class="contact-icons">
            <a href="mailto:apollo1@stanford.edu">
                <img class="link-icon" src="images/email.png" alt="Email">
            </a>
            <a href="https://www.linkedin.com/in/apollo-lee/" target="_blank">
                <img class="link-icon" src="images/linkedin.png" alt="LinkedIn">
            </a>
        </div>
        <p class="intro-text">Hi! I'm a student at Stanford studying electrical engineering.</p>
    </div>
</body>
</html>
