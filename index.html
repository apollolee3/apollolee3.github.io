<!DOCTYPE html>
<html>
<head>
    <title>Apollo Lee</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="images/rocket.png" type="image/png">
    <style>
        body {
            padding: 75px;
            font-family: Courier, monospace; 
            background: url('images/background.jpg'); /* change this to your preferred background image */
            background-size: cover; /* added this line: scales the image as large as possible without stretching or squishing it */
            background-repeat: no-repeat; /* added this line: prevents the image from repeating */
            background-position: center; /* added this line: centers the image in the viewport */
        }
        @media (max-width: 600px) {
           body {
              padding: 20px;
           }
        }
        .link-icon {
            height: 20px;
            width: 20px;
            margin-right: 12px;
            display: inline-block;
            margin: 0 auto;
        }
        a {
            text-decoration: none;
        }
        .profile-section, .contact-icons, .intro-text {
            margin-bottom: 30px;
            text-align: center; /* added this line */
        }
        .profile-pic {
            width: 80px; /* or however large you want the image */
            height: auto; /* maintains aspect ratio */
            margin-bottom: 30px; /* added this line */
            display: block; /* centers the image */
            margin: 0 auto;
        }
        .content-container {
            background: #FFFFFF; /* white background for content container */
            padding: 30px; /* padding around content */
            display: block; /* changed this line */
            width: 50%; /* added this line */
            margin: 0 auto; /* added this line */
        }
        @media (max-width: 600px) {
            .content-container {
                width: 90%; /* change width for smaller screens */
            }
        }
    </style>
</head>
<body>
    <div class="content-container"> <!-- added this line -->
        <div class="profile-section">
            <img src="images/astronaut.png" alt="Apollo Lee" class="profile-pic">
            <h1>Apollo Lee</h1>
        </div>
        <div class="contact-icons">
            <a href="mailto:apollo1@stanford.edu">
                <img class="link-icon" src="images/email.png" alt="Email">
            </a>
            <a href="https://www.linkedin.com/in/apollo-lee/" target="_blank">
                <img class="link-icon" src="images/linkedin.png" alt="LinkedIn">
            </a>
        </div>
        <p class="intro-text">Hi! I'm a student at Stanford studying electrical engineering.</p>
    </div> <!-- added this line -->
</body>
</html>
